<!DOCTYPE html>
<html>
<head>
  <title>System City v0.2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; font-family: system-ui, sans-serif; }
    #c { width: 100vw; height: 100vh; display: block; }

    /* ── HUD bar ─────────────────────────────────────────── */
    #hud {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 60px; background: rgba(10,10,18,0.88);
      display: flex; align-items: center; gap: 8px; padding: 0 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .hud-sep {
      width: 1px; height: 32px;
      background: rgba(255,255,255,0.12); margin: 0 4px;
    }
    #hud button {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      color: #ccc; padding: 6px 13px;
      border-radius: 5px; cursor: pointer; font-size: 12px;
      transition: background 0.15s;
    }
    #hud button:hover { background: rgba(255,255,255,0.15); }
    #hud button.active { background: #1a4fa8; border-color: #4a8fd5; color: #fff; }
    #hud button.active-green { background: #1a6b3a; border-color: #3aad6a; color: #fff; }
    #mode-label {
      font-size: 12px; color: #888; min-width: 130px;
    }
    #hud-right {
      margin-left: auto; font-size: 11px;
      color: #444; letter-spacing: 0.03em;
    }

    /* ── Terrain panel ──────────────────────────────────── */
    #terrain-panel {
      display: none;
      position: absolute; top: 15px; right: 15px;
      background: rgba(12,12,22,0.92);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 16px; width: 220px;
      color: #ccc; font-size: 13px;
    }
    #terrain-panel h4 {
      margin: 0 0 12px; font-size: 13px;
      font-weight: 500; color: #fff;
    }
    .tp-group { margin-bottom: 12px; }
    .tp-label {
      display: flex; justify-content: space-between;
      margin-bottom: 4px; font-size: 12px; color: #aaa;
    }
    #terrain-panel input[type=range] { width: 100%; accent-color: #4a8fd5; }
    .tp-brushes {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 5px; margin-top: 6px;
    }
    .tp-brushes button {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #bbb; padding: 5px 0;
      border-radius: 4px; cursor: pointer;
      font-size: 11px; transition: background 0.15s;
    }
    .tp-brushes button:hover { background: rgba(255,255,255,0.13); }
    .tp-brushes button.sel { background: #1a4fa8; border-color: #4a8fd5; color: #fff; }
    .tp-hint {
      font-size: 11px; color: #555; margin-top: 10px; line-height: 1.5;
    }
    #export-btn {
      width: 100%; margin-top: 10px; padding: 7px;
      background: #163d25; border: 1px solid #2a7a4a;
      color: #7fffc4; border-radius: 5px; cursor: pointer;
      font-size: 12px;
    }
    #export-btn:hover { background: #1e5434; }

    /* ── Road type panel ────────────────────────────────── */
    #road-panel {
      display: none;
      position: absolute; top: 15px; left: 15px;
      background: rgba(12,12,22,0.92);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 16px; width: 210px;
      color: #ccc; font-size: 13px;
    }
    #road-panel h4 { margin: 0 0 10px; font-size: 13px; font-weight: 500; color: #fff; }
    .road-type-btn {
      display: block; width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #bbb; padding: 7px 10px; margin-bottom: 5px;
      border-radius: 4px; cursor: pointer; font-size: 12px;
      text-align: left; transition: background 0.15s;
    }
    .road-type-btn:hover { background: rgba(255,255,255,0.12); }
    .road-type-btn.sel { background: #1a4fa8; border-color: #4a8fd5; color: #fff; }
    .road-hint {
      font-size: 11px; color: #555; margin-top: 8px; line-height: 1.5;
    }

    /* ── Info overlay ───────────────────────────────────── */
    #info {
      position: absolute; top: 15px;
      left: 50%; transform: translateX(-50%);
      background: rgba(12,12,22,0.82);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px; padding: 7px 16px;
      font-size: 12px; color: #aaa; pointer-events: none;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<!-- HUD -->
<div id="hud">
  <span id="mode-label">Mode: camera</span>
  <div class="hud-sep"></div>
  <button id="btn-terrain" onclick="setMode('terrain')">Terrain</button>
  <div class="hud-sep"></div>
  <button id="btn-road"    onclick="setMode('road')">Road</button>
  <button id="btn-zone"    onclick="setMode('zone')">Zone</button>
  <button id="btn-bulldoze" onclick="setMode('bulldoze')">Bulldoze</button>
  <div id="hud-right">System City v0.2</div>
</div>

<!-- Terrain panel -->
<div id="terrain-panel">
  <h4>Terrain editor</h4>
  <div class="tp-group">
    <div class="tp-label"><span>Brush radius</span><span id="br-val">12</span></div>
    <input type="range" id="br" min="2" max="60" step="1" value="12">
  </div>
  <div class="tp-group">
    <div class="tp-label"><span>Strength</span><span id="bs-val">0.5</span></div>
    <input type="range" id="bs" min="0.05" max="3" step="0.05" value="0.5">
  </div>
  <div class="tp-group">
    <div class="tp-label"><span>Brush mode</span></div>
    <div class="tp-brushes">
      <button class="sel" onclick="setBrush('raise')">Raise</button>
      <button onclick="setBrush('lower')">Lower</button>
      <button onclick="setBrush('flatten')">Flatten</button>
      <button onclick="setBrush('smooth')">Smooth</button>
    </div>
  </div>
  <button id="export-btn" onclick="exportHeightmap()">Export heightmap PNG</button>
  <div class="tp-hint">Hold Shift + drag to sculpt terrain.</div>
</div>

<!-- Road type panel -->
<div id="road-panel">
  <h4>Road type</h4>
  <button class="road-type-btn sel" onclick="setRoadType('dirt')">Dirt track (1 lane)</button>
  <button class="road-type-btn" onclick="setRoadType('residential')">Residential street (2L)</button>
  <button class="road-type-btn" onclick="setRoadType('avenue')">Avenue (4 lane)</button>
  <button class="road-type-btn" onclick="setRoadType('boulevard')">Boulevard (6 lane)</button>
  <div class="road-hint">
    Click 1 — start<br>
    Click 2 — curve handle<br>
    Right click — finish road
  </div>
</div>

<!-- Info bar -->
<div id="info">Camera mode — select a tool from the HUD</div>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script>

// ═══════════════════════════════════════════════════════════
//  ENGINE + SCENE
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById("c");
const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true });
const scene  = new BABYLON.Scene(engine);
scene.clearColor = new BABYLON.Color4(0.53, 0.72, 0.87, 1);

// ═══════════════════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════════════════
const cam = new BABYLON.ArcRotateCamera("cam", -Math.PI/2, Math.PI/3, 120, BABYLON.Vector3.Zero(), scene);
cam.attachControl(canvas, true);
cam.lowerRadiusLimit  = 8;
cam.upperRadiusLimit  = 350;
cam.lowerBetaLimit    = 0.18;
cam.upperBetaLimit    = Math.PI / 2.05;
cam.panningSensibility = 60;
cam.wheelDeltaPercentage = 0.01;
// Middle mouse or right mouse for pan, left mouse reserved for tools
cam.inputs.attached.pointers.buttons = [1, 2];

// ═══════════════════════════════════════════════════════════
//  LIGHTS
// ═══════════════════════════════════════════════════════════
const sun = new BABYLON.DirectionalLight("sun", new BABYLON.Vector3(-1, -2, -1), scene);
sun.intensity = 1.1;
sun.position  = new BABYLON.Vector3(100, 200, 100);
const amb = new BABYLON.HemisphericLight("amb", new BABYLON.Vector3(0,1,0), scene);
amb.intensity = 0.45;
amb.diffuse   = new BABYLON.Color3(0.9, 0.95, 1.0);

// ═══════════════════════════════════════════════════════════
//  TERRAIN
// ═══════════════════════════════════════════════════════════
const T_SIZE = 512;
const T_SEGS = 150; // 150×150 = 22,801 verts — good resolution

const terrain = BABYLON.MeshBuilder.CreateGround("terrain", {
  width: T_SIZE, height: T_SIZE,
  subdivisions: T_SEGS,
  updatable: true
}, scene);

const terrainMat = new BABYLON.StandardMaterial("tmat", scene);
terrainMat.diffuseColor  = new BABYLON.Color3(0.28, 0.52, 0.18);
terrainMat.specularColor = new BABYLON.Color3(0.05, 0.05, 0.05);
terrain.material = terrainMat;

// ── Vertex helpers ─────────────────────────────────────────
function getVerts() {
  return terrain.getVerticesData(BABYLON.VertexBuffer.PositionKind);
}
function setVerts(v) {
  terrain.updateVerticesData(BABYLON.VertexBuffer.PositionKind, v);
  terrain.createNormals(false);
}

// Get terrain Y at any world XZ (simple nearest-vertex lookup)
function terrainHeightAt(wx, wz) {
  const verts = getVerts();
  let best = 0, bestDist = Infinity;
  for (let i = 0; i < verts.length; i += 3) {
    const dx = verts[i] - wx, dz = verts[i+2] - wz;
    const d = dx*dx + dz*dz;
    if (d < bestDist) { bestDist = d; best = verts[i+1]; }
  }
  return best;
}

// ═══════════════════════════════════════════════════════════
//  TERRAIN BRUSH (ported logic, Babylon API)
// ═══════════════════════════════════════════════════════════
let brushMode   = "raise";
let brushRadius = 12;
let brushStr    = 0.5;
let isShift     = false;
let isPainting  = false;

document.getElementById("br").addEventListener("input", e => {
  brushRadius = parseFloat(e.target.value);
  document.getElementById("br-val").textContent = brushRadius;
  updateBrushRingScale();
});
document.getElementById("bs").addEventListener("input", e => {
  brushStr = parseFloat(e.target.value);
  document.getElementById("bs-val").textContent = brushStr.toFixed(2);
});

function setBrush(m) {
  brushMode = m;
  document.querySelectorAll(".tp-brushes button").forEach(b => b.classList.remove("sel"));
  event.target.classList.add("sel");
}

function applyBrush(hit) {
  const verts = getVerts();
  const hx = hit.x, hz = hit.z, hy = hit.y;

  if (brushMode === "smooth") {
    const copy = verts.slice();
    const rowLen = (T_SEGS + 1) * 3;
    for (let i = 0; i < verts.length; i += 3) {
      const dx = verts[i] - hx, dz = verts[i+2] - hz;
      const dist = Math.sqrt(dx*dx + dz*dz);
      if (dist > brushRadius) continue;
      const falloff = 1 - dist / brushRadius;
      const nb = [i-3, i+3, i-rowLen, i+rowLen];
      let sum = copy[i+1], cnt = 1;
      nb.forEach(n => { if (n >= 0 && n < copy.length) { sum += copy[n+1]; cnt++; } });
      verts[i+1] += ((sum/cnt) - verts[i+1]) * falloff * brushStr * 0.4;
    }
  } else {
    for (let i = 0; i < verts.length; i += 3) {
      const dx = verts[i] - hx, dz = verts[i+2] - hz;
      const dist = Math.sqrt(dx*dx + dz*dz);
      if (dist > brushRadius) continue;
      const falloff = 1 - dist / brushRadius;
      const delta = brushStr * falloff;
      if (brushMode === "raise")   verts[i+1] += delta;
      if (brushMode === "lower")   verts[i+1] -= delta;
      if (brushMode === "flatten") verts[i+1] += (hy - verts[i+1]) * falloff * 0.25;
      verts[i+1] = Math.max(-30, Math.min(80, verts[i+1]));
    }
  }
  setVerts(verts);
}

// ── Export heightmap PNG ───────────────────────────────────
function exportHeightmap() {
  const size = T_SEGS + 1;
  const verts = getVerts();
  const cvs = document.createElement("canvas");
  cvs.width = cvs.height = size;
  const ctx = cvs.getContext("2d");
  const img = ctx.createImageData(size, size);

  // Find min/max Y for normalisation
  let minY = Infinity, maxY = -Infinity;
  for (let i = 1; i < verts.length; i += 3) {
    if (verts[i] < minY) minY = verts[i];
    if (verts[i] > maxY) maxY = verts[i];
  }
  const range = maxY - minY || 1;

  for (let row = 0; row < size; row++) {
    for (let col = 0; col < size; col++) {
      const vi = (row * size + col) * 3;
      const v = Math.round(((verts[vi+1] - minY) / range) * 255);
      const pi = (row * size + col) * 4;
      img.data[pi] = img.data[pi+1] = img.data[pi+2] = v;
      img.data[pi+3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  const a = document.createElement("a");
  a.download = "system-city-heightmap.png";
  a.href = cvs.toDataURL();
  a.click();
}

// ═══════════════════════════════════════════════════════════
//  BRUSH RING VISUALISER
// ═══════════════════════════════════════════════════════════
const brushRing = BABYLON.MeshBuilder.CreateTorus("brushRing", {
  diameter: 10, thickness: 0.5, tessellation: 36
}, scene);
const bRingMat = new BABYLON.StandardMaterial("brmat", scene);
bRingMat.diffuseColor  = new BABYLON.Color3(1, 0.35, 0.35);
bRingMat.emissiveColor = new BABYLON.Color3(0.5, 0.1, 0.1);
brushRing.material  = bRingMat;
brushRing.isPickable = false;
brushRing.isVisible  = false;
brushRing.rotation.x = Math.PI / 2;

function updateBrushRingScale() {
  const s = brushRadius / 5;
  brushRing.scaling.x = s;
  brushRing.scaling.z = s;
}
updateBrushRingScale();

// ═══════════════════════════════════════════════════════════
//  GRID SNAP
// ═══════════════════════════════════════════════════════════
const GRID = 8;
function snapToGrid(p) {
  return new BABYLON.Vector3(
    Math.round(p.x / GRID) * GRID,
    p.y,
    Math.round(p.z / GRID) * GRID
  );
}

// ── Snap dot ───────────────────────────────────────────────
const snapDot = BABYLON.MeshBuilder.CreateCylinder("snap", {
  diameter: 1.8, height: 0.4, tessellation: 14
}, scene);
const sdMat = new BABYLON.StandardMaterial("sdmat", scene);
sdMat.diffuseColor  = new BABYLON.Color3(1, 0.9, 0.1);
sdMat.emissiveColor = new BABYLON.Color3(0.4, 0.35, 0.0);
snapDot.material    = sdMat;
snapDot.isPickable  = false;
snapDot.isVisible   = false;

// ═══════════════════════════════════════════════════════════
//  ROAD TYPES
// ═══════════════════════════════════════════════════════════
const ROAD_TYPES = {
  dirt:        { name: "Dirt track",          width: 3,  color: [0.45, 0.32, 0.18], plotDepth: 10, plotOffset: 4  },
  residential: { name: "Residential street",  width: 5,  color: [0.20, 0.20, 0.20], plotDepth: 14, plotOffset: 6  },
  avenue:      { name: "Avenue",              width: 9,  color: [0.17, 0.17, 0.17], plotDepth: 18, plotOffset: 8  },
  boulevard:   { name: "Boulevard",           width: 14, color: [0.14, 0.14, 0.14], plotDepth: 22, plotOffset: 10 },
};
let currentRoadType = "dirt";

function setRoadType(t) {
  currentRoadType = t;
  document.querySelectorAll(".road-type-btn").forEach(b => b.classList.remove("sel"));
  event.target.classList.add("sel");
}

// ═══════════════════════════════════════════════════════════
//  ROAD STATE MACHINE
// ═══════════════════════════════════════════════════════════
const rs = {
  phase: 0,          // 0=idle 1=placed_A 2=placed_handle
  A: null, B: null,  // A=start B=bezier handle
  preview: null,
  markerA: null,

  reset() {
    this.phase = 0; this.A = null; this.B = null;
    if (this.preview) { this.preview.dispose(); this.preview = null; }
    if (this.markerA) { this.markerA.dispose(); this.markerA = null; }
  },

  placeNodeMarker(pos) {
    const s = BABYLON.MeshBuilder.CreateSphere("ma", { diameter: 2.2 }, scene);
    s.position = pos.clone(); s.position.y += 1.1;
    s.isPickable = false;
    const m = new BABYLON.StandardMaterial("mam", scene);
    m.diffuseColor  = new BABYLON.Color3(0.2, 0.55, 1);
    m.emissiveColor = new BABYLON.Color3(0.05, 0.2, 0.5);
    s.material = m;
    return s;
  },

  updatePreview(A, handle, endPos) {
    if (this.preview) this.preview.dispose();
    const curve = BABYLON.Curve3.CreateQuadraticBezier(A, handle, endPos, 32);
    const pts = curve.getPoints();
    const rt = ROAD_TYPES[currentRoadType];
    this.preview = BABYLON.MeshBuilder.CreateTube("rprev", {
      path: pts, radius: rt.width / 2, tessellation: 6
    }, scene);
    this.preview.isPickable = false;
    const pm = new BABYLON.StandardMaterial("prm", scene);
    const c = rt.color;
    pm.diffuseColor = new BABYLON.Color3(c[0]+0.15, c[1]+0.15, c[2]+0.35);
    pm.alpha = 0.55;
    this.preview.material = pm;
  }
};

// ═══════════════════════════════════════════════════════════
//  ROAD DATA + BUILDING
// ═══════════════════════════════════════════════════════════
const roads = [];
const plots = [];

function buildRoad(A, handle, C) {
  const rt = ROAD_TYPES[currentRoadType];
  const curve = BABYLON.Curve3.CreateQuadraticBezier(A, handle, C, 48);
  const pts = curve.getPoints();

  // Road mesh
  const mesh = BABYLON.MeshBuilder.CreateTube("road_" + roads.length, {
    path: pts, radius: rt.width / 2, tessellation: 8
  }, scene);
  mesh.isPickable = false;
  const rm = new BABYLON.StandardMaterial("rmat_" + roads.length, scene);
  const c = rt.color;
  rm.diffuseColor  = new BABYLON.Color3(c[0], c[1], c[2]);
  rm.specularColor = new BABYLON.Color3(0.03, 0.03, 0.03);
  mesh.material = rm;

  // Centre-line dashes
  addCentreDashes(pts);

  const road = { id: roads.length, type: currentRoadType, A, handle, C, curve: pts, plots: [] };
  generatePlots(road);
  roads.push(road);
}

function addCentreDashes(pts) {
  const dashMat = new BABYLON.StandardMaterial("dm_" + Math.random(), scene);
  dashMat.diffuseColor  = new BABYLON.Color3(1, 1, 1);
  dashMat.emissiveColor = new BABYLON.Color3(0.3, 0.3, 0.3);

  for (let i = 3; i < pts.length - 3; i += 5) {
    const p    = pts[i];
    const next = pts[Math.min(i+1, pts.length-1)];
    const dir  = next.subtract(p).normalize();
    const angle = Math.atan2(dir.x, dir.z);
    const dash  = BABYLON.MeshBuilder.CreateBox("d" + i, {
      width: 0.35, depth: 1.6, height: 0.06
    }, scene);
    dash.position   = p.clone();
    dash.position.y += 0.18;
    dash.rotation.y = angle;
    dash.isPickable = false;
    dash.material   = dashMat;
  }
}

// ── Plot generation ────────────────────────────────────────
function generatePlots(road) {
  const pts = road.curve;
  const rt  = ROAD_TYPES[road.type];

  for (let i = 4; i < pts.length - 4; i += 4) {
    const p    = pts[i];
    const next = pts[Math.min(i+1, pts.length-1)];
    const dir  = next.subtract(p).normalize();
    const perp = new BABYLON.Vector3(-dir.z, 0, dir.x);
    const angle = Math.atan2(dir.x, dir.z);

    for (const side of [1, -1]) {
      const centre = p.add(perp.scale(side * (rt.plotOffset + rt.plotDepth / 2)));
      centre.y = 0.08;
      spawnPlot(centre, angle, road, rt.plotDepth);
    }
  }
}

function spawnPlot(pos, angle, road, depth) {
  const box = BABYLON.MeshBuilder.CreateBox("plot_" + plots.length, {
    width: GRID, depth: depth, height: 0.18
  }, scene);
  box.position = pos.clone();
  box.rotation.y = angle;

  const pm = new BABYLON.StandardMaterial("pmat_" + plots.length, scene);
  pm.diffuseColor = new BABYLON.Color3(0.55, 0.82, 0.40);
  pm.alpha = 0.65;
  box.material = pm;

  const plot = { id: plots.length, mesh: box, zone: null, building: null, road };
  plots.push(plot);
  road.plots.push(plot);

  box.actionManager = new BABYLON.ActionManager(scene);
  box.actionManager.registerAction(new BABYLON.ExecuteCodeAction(
    BABYLON.ActionManager.OnPickTrigger, () => {
      if (appMode === "zone")     zonePlot(plot);
      if (appMode === "bulldoze") bulldozePlot(plot);
    }
  ));
}

// Zone colours per type
const ZONE_COLORS = {
  residential: new BABYLON.Color3(0.25, 0.72, 0.28),
  commercial:  new BABYLON.Color3(0.20, 0.45, 0.85),
  industrial:  new BABYLON.Color3(0.85, 0.72, 0.15),
};
let currentZone = "residential";

function zonePlot(plot) {
  if (plot.zone) return;
  plot.zone = currentZone;
  plot.mesh.material.diffuseColor = ZONE_COLORS[currentZone];
  plot.mesh.material.alpha = 0.85;
  spawnBuilding(plot);
}

function spawnBuilding(plot) {
  const rt = ROAD_TYPES[plot.road.type];
  const baseW = GRID * 0.62;
  const baseD = rt.plotDepth * 0.52;

  let h;
  if (plot.zone === "residential") h = 3  + Math.random() * 7;
  if (plot.zone === "commercial")  h = 6  + Math.random() * 18;
  if (plot.zone === "industrial")  h = 4  + Math.random() * 6;

  const b = BABYLON.MeshBuilder.CreateBox("b_" + plot.id, {
    width: baseW, depth: baseD, height: h
  }, scene);
  b.position   = plot.mesh.position.clone();
  b.position.y = h / 2 + 0.1;
  b.rotation.y = plot.mesh.rotation.y;
  b.isPickable = false;

  const bm = new BABYLON.StandardMaterial("bm_" + plot.id, scene);
  if (plot.zone === "residential") bm.diffuseColor = new BABYLON.Color3(0.85+Math.random()*0.1, 0.80+Math.random()*0.1, 0.72+Math.random()*0.1);
  if (plot.zone === "commercial")  bm.diffuseColor = new BABYLON.Color3(0.55+Math.random()*0.2, 0.65+Math.random()*0.2, 0.80+Math.random()*0.2);
  if (plot.zone === "industrial")  bm.diffuseColor = new BABYLON.Color3(0.60+Math.random()*0.1, 0.55+Math.random()*0.1, 0.48+Math.random()*0.1);
  bm.specularColor = new BABYLON.Color3(0.05, 0.05, 0.05);
  b.material = bm;
  plot.building = b;
}

function bulldozePlot(plot) {
  if (plot.building) { plot.building.dispose(); plot.building = null; }
  plot.zone = null;
  plot.mesh.material.diffuseColor = new BABYLON.Color3(0.55, 0.82, 0.40);
  plot.mesh.material.alpha = 0.65;
}

// ── Zone selector keyboard shortcuts ──────────────────────
window.addEventListener("keydown", e => {
  if (e.key === "1" && appMode === "zone") { currentZone = "residential"; setInfo("Zone: residential — click plots"); }
  if (e.key === "2" && appMode === "zone") { currentZone = "commercial";  setInfo("Zone: commercial — click plots"); }
  if (e.key === "3" && appMode === "zone") { currentZone = "industrial";  setInfo("Zone: industrial — click plots"); }
  if (e.key === "Shift") isShift = true;
  if (e.key === "Escape") { rs.reset(); setMode("camera"); }
});
window.addEventListener("keyup", e => {
  if (e.key === "Shift") { isShift = false; isPainting = false; }
});

// ═══════════════════════════════════════════════════════════
//  MODE MANAGEMENT
// ═══════════════════════════════════════════════════════════
let appMode = "camera";

function setMode(m) {
  appMode = m;
  rs.reset();
  snapDot.isVisible   = false;
  brushRing.isVisible = false;

  document.getElementById("terrain-panel").style.display = m === "terrain" ? "block" : "none";
  document.getElementById("road-panel").style.display    = m === "road"    ? "block" : "none";

  document.querySelectorAll("#hud button").forEach(b => {
    b.classList.remove("active", "active-green");
  });
  const btn = document.getElementById("btn-" + m);
  if (btn) btn.classList.add(m === "bulldoze" ? "active-green" : "active");

  document.getElementById("mode-label").textContent = "Mode: " + m;

  const hints = {
    camera:   "Camera mode — middle/right drag to pan, scroll to zoom",
    terrain:  "Terrain mode — hold Shift + drag to sculpt",
    road:     "Road mode — left click start, left click curve, right click finish",
    zone:     "Zone mode — click a plot to zone it (1=residential 2=commercial 3=industrial)",
    bulldoze: "Bulldoze mode — click a building to remove it",
  };
  setInfo(hints[m] || "");
}

function setInfo(t) {
  document.getElementById("info").textContent = t;
}

// ═══════════════════════════════════════════════════════════
//  POINTER EVENTS
// ═══════════════════════════════════════════════════════════
let isMouseDown = false;

scene.onPointerMove = function() {
  const hit = scene.pick(scene.pointerX, scene.pointerY, m => m.name === "terrain");
  if (!hit.hit) return;
  const wp = hit.pickedPoint;

  // Terrain brush
  if (appMode === "terrain") {
    brushRing.isVisible = true;
    brushRing.position.x = wp.x;
    brushRing.position.y = wp.y + 0.3;
    brushRing.position.z = wp.z;
    if (isShift && isMouseDown) applyBrush(wp);
    return;
  }

  brushRing.isVisible = false;

  // Road preview
  if (appMode === "road") {
    snapDot.isVisible = true;
    const snapped = snapToGrid(wp);
    snapDot.position.x = snapped.x;
    snapDot.position.y = wp.y + 0.25;
    snapDot.position.z = snapped.z;

    if (rs.phase === 1) {
      rs.updatePreview(rs.A, snapToGrid(wp), snapToGrid(wp));
    }
    if (rs.phase === 2) {
      rs.updatePreview(rs.A, rs.B, snapToGrid(wp));
    }
  } else {
    snapDot.isVisible = false;
  }
};

canvas.addEventListener("mousedown", e => {
  isMouseDown = true;

  // Terrain painting
  if (appMode === "terrain" && isShift) {
    const hit = scene.pick(scene.pointerX, scene.pointerY, m => m.name === "terrain");
    if (hit.hit) { isPainting = true; applyBrush(hit.pickedPoint); }
    return;
  }

  if (appMode !== "road") return;

  const hit = scene.pick(scene.pointerX, scene.pointerY, m => m.name === "terrain");
  if (!hit.hit) return;

  if (e.button === 2) {
    // Right click — finish road
    if (rs.phase === 2) {
      const C = snapToGrid(hit.pickedPoint);
      C.y = hit.pickedPoint.y;
      buildRoad(rs.A, rs.B, C);
    }
    rs.reset();
    return;
  }

  if (e.button === 0) {
    const snapped = snapToGrid(hit.pickedPoint);
    snapped.y = hit.pickedPoint.y;

    if (rs.phase === 0) {
      // Check snap to existing node
      const existing = nearestNode(snapped, 7);
      rs.A = existing || snapped;
      rs.phase = 1;
      rs.markerA = rs.placeNodeMarker(rs.A);
    } else if (rs.phase === 1) {
      rs.B = hit.pickedPoint.clone(); // handle floats free
      rs.phase = 2;
    }
  }
});

canvas.addEventListener("mouseup", () => { isMouseDown = false; isPainting = false; });
canvas.addEventListener("contextmenu", e => e.preventDefault());

// Find nearest existing road node within threshold
function nearestNode(pos, threshold) {
  for (const road of roads) {
    for (const node of [road.A, road.C]) {
      if (node && BABYLON.Vector3.Distance(pos, node) < threshold) {
        return node.clone();
      }
    }
  }
  return null;
}

// ═══════════════════════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════════════════════
engine.runRenderLoop(() => scene.render());
window.addEventListener("resize", () => engine.resize());

// Start in camera mode
setMode("camera");

</script>
</body>
